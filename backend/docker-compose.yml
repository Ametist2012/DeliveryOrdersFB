services:
  postgres:
    image: postgres:17
    container_name: deliveryorders-postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: deliveryorders

    ports:
      - "5410:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
